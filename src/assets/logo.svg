<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Loop icon - stylized infinity/loop road -->
  <g transform="translate(30, 25)">
    <!-- Outer loop (road) -->
    <path d="M 75 75 
             C 75 35, 115 15, 145 35 
             C 175 55, 175 95, 145 115 
             C 115 135, 75 115, 75 75" 
          fill="none" stroke="url(#brandGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Inner loop (arrow/forward motion) -->
    <path d="M 75 75 
             C 75 45, 105 30, 125 45 
             C 145 60, 145 90, 125 105 
             C 105 120, 75 105, 75 75" 
          fill="none" stroke="#F97316" stroke-width="5" stroke-linecap="round" stroke-dasharray="0 0"/>
    <!-- Forward arrow -->
    <polygon points="145,75 130,62 130,88" fill="#F97316"/>
    <!-- Road dashes on outer loop -->
    <circle cx="75" cy="30" r="3" fill="#0891B2"/>
    <circle cx="155" cy="75" r="3" fill="#F97316"/>
  </g>

  <!-- Brand name "Loop" -->
  <text x="210" y="105" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#1B3A5C">
    Loop
  </text>

  <!-- Tagline -->
  <text x="212" y="140" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="5" fill="#0891B2" text-transform="uppercase">
    DRIVE NOW · PAY LATER
  </text>
</svg>